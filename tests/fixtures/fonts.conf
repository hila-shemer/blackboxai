<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Isolated fontconfig for deterministic text goldens. Tests point
     FONTCONFIG_FILE at this file (with cwd = project source root). The single
     <dir> contains exactly one font, so EVERY family request resolves to the
     bundled LiberationMono-Regular.ttf, regardless of the host's installed
     fonts. The forced rendering knobs pin the raster (no host fontconfig
     defaults can perturb hinting/antialiasing). -->
<fontconfig>
  <dir prefix="cwd">tests/fixtures/fonts</dir>
  <cachedir>/tmp/bbai-fontconfig-cache</cachedir>

  <match target="font">
    <edit name="antialias"      mode="assign"><bool>true</bool></edit>
    <edit name="hinting"        mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle"      mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"           mode="assign"><const>none</const></edit>
    <edit name="autohint"       mode="assign"><bool>false</bool></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
  </match>
</fontconfig>
